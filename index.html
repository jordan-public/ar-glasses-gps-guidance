<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no" />
    <title>Even Hub Navigation</title>
    <style>
      html, body {
        margin: 0;
        height: 100%;
        /* ER brand dark-theme surface (#232323) + Neutral-200 text (#E5E5E5). */
        background: #232323;
        color: #E5E5E5;
        font: 14px/1.4 -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
        /* Kill WebView zoom + iOS auto-sizing + rubber-band scroll. */
        touch-action: manipulation;
        -webkit-text-size-adjust: 100%;
        overscroll-behavior: none;
      }
      button,
      input,
      select {
        font: inherit;
      }
      #app {
        display: flex;
        height: 100%;
        align-items: center;
        justify-content: center;
        box-sizing: border-box;
        padding: 20px;
      }
      .shell {
        width: min(100%, 420px);
      }
      .status {
        border: 1px solid #3A3A3A;
        border-radius: 8px;
        padding: 20px;
        background: #2B2B2B;
      }
      .eyebrow,
      .meta {
        margin: 0;
        color: #A3A3A3;
        font-size: 12px;
        text-transform: uppercase;
      }
      h1 {
        margin: 12px 0 0;
        color: #FFFFFF;
        font-size: 38px;
        line-height: 1;
        letter-spacing: 0;
      }
      .distance {
        margin: 8px 0 0;
        color: #FFFFFF;
        font-size: 28px;
        font-weight: 700;
      }
      .instruction {
        margin: 18px 0 0;
        color: #F5F5F5;
        font-size: 18px;
      }
      .street {
        margin: 6px 0 0;
        color: #C7C7C7;
      }
      .meter {
        height: 8px;
        margin: 20px 0 12px;
        overflow: hidden;
        border-radius: 999px;
        background: #444444;
      }
      .meter span {
        display: block;
        height: 100%;
        background: #49C6A3;
      }
      .controls {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
        margin-top: 12px;
      }
      .route-form {
        display: grid;
        gap: 10px;
        margin-top: 12px;
        border: 1px solid #3A3A3A;
        border-radius: 8px;
        padding: 14px;
        background: #282828;
      }
      .route-form label {
        display: grid;
        gap: 5px;
      }
      .route-form span {
        color: #BDBDBD;
        font-size: 12px;
      }
      .route-form input,
      .route-form select {
        width: 100%;
        min-height: 40px;
        border: 1px solid #4A4A4A;
        border-radius: 6px;
        box-sizing: border-box;
        background: #1F1F1F;
        color: #F5F5F5;
        padding: 8px 10px;
      }
      .route-form .primary {
        min-height: 44px;
        border: 0;
        border-radius: 6px;
        background: #49C6A3;
        color: #10231D;
        font-weight: 700;
      }
      .controls button {
        min-height: 44px;
        border: 1px solid #4A4A4A;
        border-radius: 6px;
        background: #343434;
        color: #F5F5F5;
      }
      .controls button:active {
        background: #404040;
      }
    </style>
  </head>
  <body>
    <div id="app">Starting navigation...</div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
